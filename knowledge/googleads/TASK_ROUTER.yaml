fallback_mapping:
  default_knowledge_file: field_manual_v3.0
  default_skill: googleads-field-operations
  default_layer: official

validation:
  required_fields:
    - patterns
    - knowledge_files
    - layer
    - priority
  priority_range: [0, 5]

notes: |
  This router is used by agents to quickly locate relevant knowledge for Google Ads and adjacent system tasks.
  Patterns are matched against user queries case-insensitively.
  Skills are referenced by their id from registry/skills.yaml.
