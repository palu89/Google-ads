# Google Ads Task Router
# Maps specific Google Ads tasks to knowledge files and skills.

version: 1.0.0
last_updated: 2026-04-06T11:19:00Z

task_mappings:
  script_generation:
    patterns:
      - "写脚本"
      - "script"
      - "自动化"
      - "monitor"
      - "监控"
      - "自动暂停"
      - "CPA"
    knowledge_files:
      - field_manual_v3.0
      - script_architect
    skills:
      - googleads-scripts
    layer: internal
    priority: 1

  keyword_audit:
    patterns:
      - "关键词"
      - "keyword"
      - "意图"
      - "intent"
      - "清洗"
      - "audit"
      - "否定词"
      - "negative"
    knowledge_files:
      - field_manual_v3.0
      - keyword_expert
    skills:
      - googleads-keyword-expert
    layer: internal
    priority: 1

  compliance_verification:
    patterns:
      - "合规"
      - "compliance"
      - "政策"
      - "policy"
      - "金融"
      - "finance"
      - "验证"
      - "verification"
      - "G2"
    knowledge_files:
      - field_manual_v3.0
      - finance_compliance
      - policies
      - finance_navigator
    skills:
      - googleads-field-operations  # googleads-verify not yet created, orchestrator handles compliance
    layer: official
    priority: 1

  landing_page_audit:
    patterns:
      - "落地页"
      - "landing page"
      - "质量得分"
      - "quality score"
      - "LP"
      - "审计"
      - "audit"
    knowledge_files:
      - field_manual_v3.0
      - lp_auditor
    skills:
      - googleads-audit
    layer: internal
    priority: 2

  appeal_process:
    patterns:
      - "申诉"
      - "appeal"
      - "封号"
      - "suspension"
      - "拒登"
      - "rejection"
    knowledge_files:
      - field_manual_v3.0
      - appeal_process
      - agents_backup
    skills:
      - googleads-field-operations  # fallback — googleads-appeal and googleads-appealtxt not yet created
    layer: official
    priority: 1

  agent_reference:
    patterns:
      - "智能体"
      - "agent"
      - "路由"
      - "routing"
      - "googleads-"
    knowledge_files:
      - agents_backup
    layer: hybrid
    priority: 3

  general_operations:
    patterns:
      - "操作"
      - "operation"
      - "指南"
      - "guide"
      - "manual"
      - "总控台"
    knowledge_files:
      - field_manual_v3.0
    layer: official
    priority: 2

  question_optimization:
    patterns:
      - "提问"
      - "question"
      - "如何提问"
      - "prompt"
      - "prompt engineering"
      - "优化问题"
      - "optimize question"
      - "routing"
      - "路由"
    knowledge_files:
      - knowledge-retrieval-framework
      - question-framework
      - api-query-best-practices
      - prompt-engineering-guide
      - question-routing
    layer: best-practices
    priority: 1

  signal_analysis:
    patterns:
      - "signal control"
      - "signal matrix"
      - "signal engineering"
      - "信号控制"
      - "信号优先级"
      - "信号分析"
      - "信号梳理"
      - "performance diagnosis"
      - "why is performance"
      - "why did lead quality"
      - "rca"
    knowledge_files:
      - signal-control-matrix
      - signal-priority-method
      - strategy-prioritization
      - signal-analysis-playbook
    layer: hybrid
    priority: 1

fallback_mapping:
  default_knowledge_file: field_manual_v3.0
  default_skill: googleads-field-operations
  default_layer: official

validation:
  required_fields:
    - patterns
    - knowledge_files
    - layer
    - priority
  priority_range: [1, 5]  # 1 = highest priority

notes: |
  This router is used by agents to quickly locate relevant knowledge for Google Ads tasks.
  Patterns are matched against user queries (case-insensitive, partial match).
  If multiple patterns match, the highest priority mapping is used.
  
  Knowledge files are referenced by their 'id' field from registry/googleads.yaml.
  Skills are referenced by their 'id' from registry/skills.yaml.