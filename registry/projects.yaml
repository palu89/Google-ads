validation:
  required_fields:
    - id
    - entity_type
    - name
    - status
    - stage
    - summary
    - active_skills
    - active_playbooks
    - primary_goal
    - risks
    - last_updated
    - path
  project_stages:
    - planning
    - development
    - testing
    - staging
    - operational
    - maintenance
    - archived
  status_values:
    - active
    - paused
    - completed
    - cancelled

notes: |
  This registry tracks active projects.
  Each project must have a corresponding directory in /projects/<project-id>/
  with project.yaml, CURRENT_STATE.md, DECISIONS.md, and CHANGELOG.md.
  
  Project state should be updated in CURRENT_STATE.md whenever project.yaml changes.