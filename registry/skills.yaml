validation:
  required_fields:
    - id
    - name
    - description
    - entity_type
    - status
    - summary
    - depends_on
    - used_by
    - owner
    - last_updated
  status_values: [active, deprecated, experimental, unknown, planned]
  freshness_threshold_days: 90

notes: |
  Skills are executable capabilities referenced by agents.
  Project skills live under `skills/<skill-name>/`.
  System skills live under `skills/system/<skill-name>/`.
  Every indexed skill should have `SKILL.md`, `skill.yaml`, and `CHANGELOG.md`.
