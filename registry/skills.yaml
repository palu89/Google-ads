validation:
  required_fields:
    - id
    - name
    - description
    - entity_type
    - status
    - summary
    - depends_on
    - used_by
    - owner
    - last_updated
  status_values: [active, deprecated, experimental, unknown]
  freshness_threshold_days: 90

notes: |
  Skills are executable capabilities referenced by agents.
  Each skill must have a corresponding directory in /skills/<skill-name>/
  with SKILL.md, skill.yaml, and CHANGELOG.md.
  
  Skills may depend on knowledge files or other skills.
  The 'used_by' field tracks which agents reference this skill.